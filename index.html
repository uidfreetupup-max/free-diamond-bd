<!DOCTYPE html>
<html>
<head>
  <title>Free Diamond BD</title>

  <style>

    body{
      background:#050816;
      font-family:Arial;
      color:white;
      text-align:center;
      padding:20px;
    }

    h1{
      color:#00ffe1;
      font-size:40px;
      text-shadow:0 0 15px #00ffe1;
    }

    .box{
      background:#111827;
      padding:25px;
      border-radius:20px;
      margin-top:20px;
      box-shadow:0 0 20px #00ffe1;
    }

    .coin{
      font-size:30px;
      color:gold;
      margin-bottom:20px;
    }

    .btn{
      display:block;
      width:90%;
      margin:15px auto;
      padding:16px;
      border:none;
      border-radius:15px;
      font-size:18px;
      font-weight:bold;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .daily{
      background:linear-gradient(45deg,#00c6ff,#0072ff);
      box-shadow:0 0 15px #00c6ff;
    }

    .daily:hover{
      transform:scale(1.05);
    }

    .ad{
      background:linear-gradient(45deg,#ff512f,#dd2476);
      box-shadow:0 0 15px #ff512f;
    }

    .ad:hover{
      transform:scale(1.05);
    }

    .social{
      background:linear-gradient(45deg,#11998e,#38ef7d);
      box-shadow:0 0 15px #38ef7d;
    }

    .social:hover{
      transform:scale(1.05);
    }

    .refer{
      background:linear-gradient(45deg,#fc466b,#3f5efb);
      box-shadow:0 0 15px #fc466b;
    }

    .refer:hover{
      transform:scale(1.05);
    }

  </style>
</head>

<body>

  <h1>🔥 Free Diamond BD 🔥</h1>

  <div class="box">

    <p class="coin">🪙 Coins: 0</p>

    <button class="btn daily">
      🎁 Daily Reward
    </button>

    <button class="btn ad">
      📺 Watch Ads
    </button>

    <button class="btn social">
      🌍 Social Media Tasks
    </button>

    <button class="btn refer">
      👥 Refer Friends
    </button>

  </div>

</body>
</html>. ze:30p
